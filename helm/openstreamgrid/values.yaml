tracker:
  image:
    repository: ghcr.io/mytrashcan/openstreamgrid-tracker
    tag: "0.5.0"
    pullPolicy: IfNotPresent
  # SQLite uses a single writer. Scale only after selecting a shared external store.
  replicaCount: 1
  port: 7070
  env:
    STORE_TYPE: sqlite
    DB_PATH: /data/tracker.db
  auth:
    # Create this Secret before installation; see deploy/k8s/README.md.
    existingSecret: openstreamgrid-auth
    apiKeyKey: tracker-api-key
    peerSessionSecretKey: peer-session-secret
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    storageClassName: ""
  autoscaling:
    enabled: false
    maxReplicas: 6
    targetCPUUtilizationPercentage: 60

origin:
  image:
    repository: ghcr.io/mytrashcan/openstreamgrid-origin
    tag: "0.5.0"
    pullPolicy: IfNotPresent
  replicaCount: 1
  port: 8080
  env:
    HLS_DIRECTORY: /data/hls
    BROADCAST_ID: live
    # Leave empty to advertise the in-cluster Origin service. Set the external
    # HTTPS URL when browser clients access HLS through an ingress or CDN.
    PUBLIC_ORIGIN_URL: ""
  hlsSizeLimit: 256Mi
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: stream.example.com
  tls: []

networkPolicy:
  enabled: true

nameOverride: ""
fullnameOverride: ""
