{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "openstreamgrid.fullname" . }}
  labels:
    {{- include "openstreamgrid.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /hls
            pathType: Prefix
            backend:
              service:
                name: {{ include "openstreamgrid.originName" . }}
                port:
                  number: {{ .Values.origin.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "openstreamgrid.trackerName" . }}
                port:
                  number: {{ .Values.tracker.port }}
{{- end }}
