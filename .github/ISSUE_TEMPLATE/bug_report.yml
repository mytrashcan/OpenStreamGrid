name: Bug report
description: Report a reproducible problem in OpenStreamGrid
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve OpenStreamGrid. Please provide enough detail for us to reproduce the problem.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the problem and its impact.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that consistently reproduces the issue.
      placeholder: |
        1. Start the services with ...
        2. Connect a peer using ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: input
    id: docker_version
    attributes:
      label: Docker version
      description: Provide the output of `docker version` or enter "Not used."
      placeholder: Docker Engine 27.5.1
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js version
      description: Provide the output of `node --version`.
      placeholder: v22.14.0
    validations:
      required: true

  - type: input
    id: operating_system
    attributes:
      label: Operating system
      description: Include the operating system name and version.
      placeholder: Ubuntu 24.04
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      description: Paste relevant logs or error output. Remove credentials, tokens, and other sensitive data.
      render: shell
