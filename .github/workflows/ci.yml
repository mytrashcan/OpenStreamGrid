name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['22']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install browser SDK dependencies
        run: npm ci --prefix sdk

      - name: Build all workspaces
        run: npm run build

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Lint
        run: npm run lint
